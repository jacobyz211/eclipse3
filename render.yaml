services:
  - type: web
    name: soundcloud-eclipse-addon
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Optional — set SC_CLIENT_ID here to skip auto-detection entirely.
      # Find it: open soundcloud.com → DevTools (F12) → Network tab →
      # click any api-v2.soundcloud.com request → copy client_id from the URL.
      # - key: SC_CLIENT_ID
      #   value: your_32_char_id_here
